front:
  text: 序仙未必得但以多壽少病為至驗也先祖至餘四世矣男女壽百歲以上者十五人九十者四人八十者六人七十者九人自成人後夭折者希亦未有多疾而奇疾者也余祖任慶陽縣因感山嵐氣而病忽路遇仙師鼓掌嘯詠曰得便宜落便宜若非感著山嵐氣安得徐徐告疾歸邀於館舍仙師拈藥一丸令以涼水送下遂腹鳴如雷瀉惡物鬥許疾頓除仙師曰此疾臟腑不實易中若精氣堅固焉得而入耶祖乞其方書此言授之問其姓名仙師曰豫姓張名百字此法不拘男女皆可行之能上卻百病肢體強健益壽延年當為陸地仙矣言訖不見至今不輕傳豫家男女口授於姻戚亦未必全茲因吳老師陳宗師馮年兄劉年弟裴年弟諸公屢求此書於是啓仙師手筆以付諸公名為陸地仙經願我同調之士謹遵而行之廣而傳焉則仙師仁人之意溥矣賜進士第加太保兼太子太傅保和殿大學士兼戶部尚書總理事務二等伯加五級馬齊序並注時雍正四年歲次丙午夏六月望日雨後珍書於槐蔭堂之石笏軒
