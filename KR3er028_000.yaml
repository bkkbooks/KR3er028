body:
  text: 總論共百字二十句五言淡食能多補肥濃能滑人腸令人生痰早飯淡而早午飯厚而飽晚飯須要少若能常如此無病直到老五味之嗜在負重辛苦之人自不可缺而修養者當漸減之則穀氣壯而真氣長並無疾之為害搓塗自助顏面不離手金漿玉液常塗面顏色如童永不改先以唾津傅面次搓手掌極熱向臉上搓之數遍或睡時或醒時或清晨行之俱無不可城中雲馬家顏色好恰似正開蓮運睛除眼翳閉目轉睛左右各七次忽然大睜急視自覺眼內熱氣出即是妙境有金花恍惚者更佳轉睛時口鼻閉氣睜眼時盡力用口呵出濁氣吸入清氣各七次又東坡云酒醒後清晨行之可消宿疾掩耳去頭旋每清晨或臨睡時搓兩耳令熱以手急掩住左右扭頸回顧各七次又盡力點頭如鳥啄食之狀七次呵出濁氣七口永無頭旋之疾叩齒牙無病齒宜頻叩睡醒時叩齒三十六通永無蟲牙之患周蓮峰云勸君閒時莫挑牙朱升溪云勸君切莫偏冷熱趙復陽云於大小便時急咬牙關緊唇嚴密則無齒疾兜禮治傷寒兜外腎者固精除寒也偶覺身上寒熱不均頭痛口苦類傷寒之狀即舒兩腿兩手兜外腎囊閉氣低頭至氣促張口呵之如此者七次則盤膝而坐鼻納清氣或行猿臂熊經之法亦可余家不拘男婦俱行此法遂少此病鼓呵消積聚晨起兩手抱肩閉氣鼓腹澄心下視臍輪待氣促緩緩呵之如此九次又緊抱其肩左右扭之各七次名曰攪轤腹中自然快利能消積聚亦治心疼腹疼泄瀉諸疾甚驗膝風摩湧泉膝疼有三種曰風痛曰冷痛有精血虛而氣不通注於下部名曰脛痛臨睡時摩搓左右足心各七遍令極熱抱膝而眠足趾常常自撓之使血氣能通而痛自止矣人年四五十多感此疾鄭年兄常患此疾吳老師教以川椒煮湯臨睡時將兩足溫泡湯內三四時辰又令人於足趾間稍按捏之至大腿處不記遍數未及一月膝氣盡除猿臂和血脈左手伸直以右手探左手心頭卻右顧右手亦然此法當於食後行二三次能消食孕婦行之臨産最易亦無胎産之患熊經免痰涎臨睡時兩手拘定兩足直舒其腰頭卻回顧後視如此七次自無痰涎之患此法可夜間常行不間愛惜精與氣精氣乃人之根本不可妄施雖不當絶亦須愛惜年友鄭公曰餘年三十五歲無子荊妻勸余娶妾余此後常獨宿每月見妾面一二次亦未嘗通宵宿處也餘六子三女並無胎癇疹毒之患餘八十九歲矣尚能夜書細字行步如幼說者謂有奇術余自以為愛惜精氣所致也子午固關元關元乃人氣海也修養家名曰丹田在臍下一寸三分乃元氣所蓄人每心意一動則耗元氣子午二時洗心靜坐鼻息調勻反觀內顧於關元之所則一時有元氣復長之機矣年友鄭公曰子乃陽長之候屬腎午乃血生之時屬心年六十以上者宜守此穴則大便密而小便少且能耐老托踏應無病兩手上托如舉千斤之重兩腳踏地如豎石柱之直盡力上托閉氣不出待氣促徐徐呵之每清晨或食後不拘何時常常行之百病皆除三眠魂自安病龍眠拳屈其膝也寒猿眠抱其膝也龜息眠踵其膝也手足曲則心自定大凡臨睡時萬念俱絶閉口瞑目勻息側身而臥甚妙蓋人自寅而申應事接物精神已倦惟一睡乃心神歇息之頃如有事可卻之度外如有掛心事必著衣端坐秉燭應之不可枕上懸思大耗元氣飲食必節制飲食有節脾土不泄道經三世上有四百種病惟有宿食為根本晚飯少吃自無宿食之患矣城中人語曰莫問馬家食十人餓得九人死蓋以此也起居要慎焉邵子四不出謂大風大雨大暑大寒周子云切記寅時怒損肺又傷肝夏月宜早起冬天要遲眠春綿漸漸減秋夾徐徐添多行陰騭事陰騭不在修寺設醮看經念佛只在人身上打點若當惻隱之處勉力行之如魏犨嫁女而有結草之報宋郊救蟻而有及第之祥馮高善德而有三元之嗣燕山賢人而得五子之榮但行陰騭之事不可有望報之心莫作身後冤作惡事則身後冤也周蓮峰云惟世宦世豪之家多作此冤寒微之人何由而作遵行勿間斷自淡食至莫作一十六條遵而行之不可忽焉可為陸地仙縱不能飛升亦能延壽十紀真陸地仙矣此書為馬齊作按先正事略馬齊姓富察氏滿洲鑲黃旗人一等敏果公米思翰之次子由廕生受員外郎纍遷內閣學士河督尚書武英殿大學士改保和殿進太保贈太傅一等伯爵諡文穆以乾隆四年薨年八十有八銜條與此書頗合但賜進士第不實了附一治眼九法梳將兩手之指揸開梳自眉際至眼下九次擂屈兩大指骨自大眼角橫搽至小眼角外九次勒並手指橫勒眼皮九次撮揸五指撮眼皮上如撮物之狀九次一撮一摔撮時閉目摔時開目攀左手從項後攀右眼右手從項後攀左眼各九次揉屈兩大指骨蘸少津唾揉大小眼角各九次運搓熱兩手心摩眼上九次如勒狀轉閉目轉睛各九次閉閉目良久忽大睜開附二茹穹子入道始終入手諸真人說玄說妙真個玄妙然皆命寶凝性珠明譬之秋成以後谷谷咸熟粒粒有味百千真人玄門家諸書言言道妙如百穀不可缺一其所以得成熟者莫不由春耕夏耨及時培養得來今學者不知真人入手一著妄冀道妙從半空而入備極艱苦以為道在是是何異不耕耨而求秋成者所以初學道者妄冀有神仙之事才坐思報此理必不能深未始有功之修雖得必失此功能久入手者先有善根後堅道念何患不成身法凝神定氣閉目合口盤足而坐右足疊外兩手安兩足曲處從伸腰背用力提兩手起平肩分開一字掌仰上伸至頂合掌分開彎抱懷中右手疊左手掐純陽訣疊臍下則一陽生於陰而陰陽互包先旋左肩次旋右肩貴圓轉三十六數提撮前後道如忍大小便狀尾閭左右轉亦如轉左右肩數然後叩齒齒合定舌向下攪中線自左至右復至左為一轉開齒舌向外唇自下線卷至左向上線從右復下線為一轉津液滿口漱吞下以上俱三十六數是為身法有生以後人身出孔皆有液皆不可復歸惟舌下津液可飲復歸五臟故曰道水也在人身曰氣也液也氣衰則液不起液少則命不長命之系在三線舌下線為臟腑泉脈線兩旁為陰之都為百川四海之統匯外唇上線為年壽下線為疾病三線左右無時不濕萬物之生化從陰入陽皆以濕生則可知人生矣真人以舌為赤龍攪神水吞精液液化為精精化為氣氣化為神神復化為液液復化為精精復化為氣氣復化為神輪轉無窮運行無極天地不足為久壽矣九皇上經曰始青之時月與日兩半同升合成出彼玉池入金室大如彈丸黃如橘中有佳味甜如蜜玉池者舌下線兩旁之液液與神氣一合謂兩半合也玉醴金漿原是大藥而人身亦有之假如習不唾法有唾則咽之令人精氣常存面目光彩又況液之湧為醴泉液之聚為華池液之降為甘露液之靈為神水隨攪隨服無時不然養精源於臟腑宣百脈以長春玉醴金漿莫過是矣舌下津液為在天所以與我之糧而搬運不窮資飲不涸故曰糧泉每一日可攪得十六兩一晝夜計二斤服津液歸臟腑歸而復出散而復歸津液之菁華入丹田每斤得一毫勤學之士除飲食遊臥荒廢六個時計一晝夜只得六個時服液是每日有一毫至丹田由外入內之功一年計液入臟腑之數有三百六十斤計液之菁華入丹田之數止三分六釐行之一年溉臟潤身行之二年化養萬神行之三年與天地齊其徑又況抱藥飛身晝夜咽升得十二卣全在於此故曰神水不離身華池日月親若能常得飲便是大羅人由外入內之功此功行一年易曰一合一闢謂之變往來不窮謂之通合闢往來見之鼻息故曰氤氳開闢其妙無窮凡人胎中隨母呼吸氣足受生一點元陽聚於臍下而上通於鼻是云呼吸呼吸者氣之最先者也氣之在人身有八百十丈經絡相纏靡刻不運朱紫陽曰天地間只是一氣自今年冬至到明年冬至只是一呼吸大則為天地一歲之呼吸小則為人身一息之呼吸天地人身萬物精氣神合聚去所不過呼吸兩字然則入道者安得不於此處下手也古真人多言服氣是以有閉息至十至百至千者世人不知其竅亦效之豈知閉息者先吸多呼少漸有吸無呼後並呼吸俱無故有一坐數日一睡數年即千百年猶是也此已至仙之化境也初學者不可效何也蓋閉息之功妙在不動心若忍住不出則心氣阻抑神先囂矣已動之心而復阻其息內氣既亂必招之疾人心上千頭萬緒便是千生萬死無生子仙師開示由外入內之功由外者由鼻息入也吞液以來將訣頓在心上數息一百以調和氣息然後將前所頓在心上之訣取出安在兩鼻孔內每一吸有五訣綿綿而進至於呼則聽其自出行之純熟此時之心但能領略惟是皈依道訣自無暇作別想不收心而心自收其妙在頓初猶知有五進已覺氣脈和暢及至融貫竟似不出漸至不知有進並不知有訣乃是合外於內而內之瑩然者出焉五數且二五漸至三五四五五五自然而進毫無勉強有從此得忘者是云坐忘靜極則忘道根乃生有從此得睡者是云坐睡精氣不倒魂魄乃靈忽然有氣自丹田起湧至喉間為橐漸至泥丸氣衝下為籥橐籥既見其聲如雷是云內呼吸內呼吸已至便不用鼻息並無暇用訣以由外入者以外呼吸觸取內呼吸今內呼吸已至則外者可廢矣世人無一事不用心自用訣頓心此如爐中火焰正飛忽以一物頓於其上焰自不起而火之力皆為所頓之物之所用頓心亦猶是其以五數送入如有聲者即以鼻為口其以五數輪轉悉能照者即以鼻為心心死而神生譬之汞然汞之體無刻不動有法以死之汞死而寶成此數在身為五官在天為五行儒體天之教而以五倫治天下佛出天之外而空五蘊見吾心不觀之易數乎一三五七九陽數也天數五五二十有五二四六八十陰數也地數六五得三十天地之數合五十有五蓋以乾二五成十者一九合也坤二五成十者四六合也巽兌二五成十者二八合也震艮二五成十者三七合也離單得五坎二五成十坎離無偶總之五十有五不離五數也呼接天根吸接地根大易衍五天地之數咸備人身五官在父母胎中官官皆象今訣以一還一每一吸還五官原自之數而還之既久仍自歸一如大易五數之相生是為真息故曰息心明理儒之極息氣凝神道之玄息玄達本禪之機古詩曰諦觀三教聖人書息之一字最簡直若於息上做工夫為佛為仙不勞力其歸一者一水也道水一也水之數原是五數觀之土德一氣火德三氣金德七氣木德九氣而水德五氣其數皆以單行要不外二五成十之數寂兮寥兮恍兮惚兮杳兮冥兮此何物也也內取真汞內採真陽爐何在太極是也丹母何在清淨是也龍虎鄞鄂何在無所為而為不期然而然是也行住坐臥皆可見此行之時形動神凝住之時休靜神照坐之時心死神生臥之時氣精神一是之謂真息鼻氣之入止一寸二分而即出出一尺二寸而未盡人身之氣大抵入數少出數多此其驗也訣之妙只取其入而非苦於入其入也悠焉長焉五進非真以五吸而進也綿綿耳出亦非聽其出而不之照也出乃所以入耳曷為其然假如入數止一寸二分而即出則雖有五入而未能達於重樓直至一出乃得下降恍有一股暖氣自喉引至臍下此時之心領略出之妙勝於領略入之妙是出非出也出乃所以入也得手由外者取天地之氣也外呼吸也以外取內橐籥已到喜怒哀樂見未發矣風火雷電云見已發矣橐籥升降肢體動蕩無為而為不期然而然此時鼻內竟無呼吸所謂內呼吸也人既得此其樂無比其喜無極其變百出一年來亦盡受用矣然得手以後大通原無可喜雖已得手有未得者有得之更無窮者喜樂之念亦隔礙念也由內入內之功此功第二年得手所喜在內呼吸然猶有出入在由內者無出入而有上下蓋天地之所以長久惟中氣不息人秉中氣以生因有官骸魂魄是為命有生以後能不失中氣以合於天地之中氣是為理在開關時此理入於臟腑肢竅而得極樂為理與欲戰欲不能勝理久之而理著又久之而理融雖曰心死神生然死者妄也妄死而真生真即為理理即為神既得真心則萬化從心心忘其心惟有神行而存於中此中非中外之中四維六合之中中央之中兩腎中間之中心下腎上肺左肝右之中靜中觀照內呼吸漸生漸長漸融漸細上至泥丸下入海源而以心領略其妙無弗會於中宮塵心雜念一毫不起謂之中四大五行一毫不著謂之中吾神吾氣有持行之道不可太過有補虧之道不可不及故曰寂然不動者中之體感而遂通者中之用就形以求之心之上盡處為天臍之下盡處為地上盡處至下盡處計八寸四分自上下四寸二分自下上四寸二分之中為中即玄門所謂規中也規者尺也地之去天八萬四千里而以規合之人處其中為三才人一身咸備之天地之中氣在人身也無呼吸而有上下者益融益細每一氣從中而上有五送上每一氣從中而下有五送下上至於心盡之天下至於臍盡之地行之既久自覺忘氣合神欲盡理見始也精神魂魄意各安其位既也精神魂魄意各安其居中之兩頭上下皆或以上作頭或以下作頭分道而行油然融然其以上作頭者貫上泥丸從重樓直達而不由夾脊其以下作頭者貫下湧泉從氣海直達而不由脛骨所到之處便是玄關至此不復用訣上下只以訣安中處如玄門存想法是時受用又非復開關時景象矣其所以致此者大道猶大路也由內之路不以路為路而以水為路水路既足任其上下當在一年之後糧泉足乎一千八十時也若初入手開關即思行此則未有水路舟安從行故曰經營鄞鄂體虛無便把元神裡面居息往息來無間斷全胎成就合元初天地之中氣在此人體天地之中氣以為氣在此生天生地生人生萬物之中氣靡不在此由內化內之功此功第三年入道之妙至無呼吸天身地身人身三身渾然一片瑩然在中矣猶有上下則是有中間而後有兩頭兩則不一上頭多下頭亦多未還於太極之象原未有上下之至一處也無天無地無人則一矣有天有地有人歷不一而無不一則化矣一從何生生於無自無生育太極中一畫是也上一畫天下一畫地中一畫人畫三為乾三身露矣六畫成坤三身之配生二生三生萬身愈多配愈多不可復歸於一矣然而無處非一何也動靜一交而兩儀生陰陽一交而四象生一之見於老陽者乾一兌二一之見於老陰者艮七坤八一之見於少陰者離三震四一之見於少陽者巽五坎六卦之化生無非一之分現故曰一者天地之根陰陽之祖萬物之首乃生神也天地以一之根生人而為神人復以神之靈生天生地生萬而歸於一得一畢萬確有其驗也由內入內後亦既得一而未化也化者即從前之中今去其上下並去其豎者作橫以一頓於中而用訣五數自左之一頭以訣運轉自左下轉至為上四五訣五也運轉行訣微微綿綿純一不己此其時也一者剛也陽也五訣運動而柔之而陰之忽焉五初如豆漸如日如月缺得天左旋之體自然而然運轉如車輪分頭入五臟六腑九竅四肢遍歷毛孔逮其止也忽然不見而不知何所去千變萬化其妙不可言又非復由內入內時快活矣和合三家混一三元攢簇五行鑿開七竅調和五臟返氣三田周流六虛一得永來與玄門家到頭化境總之一理道家三乘禪家五派儒家五教見為分別實無分別譬之燈然處處光照千燈萬燈共成一火是為歷不一而無不一則化一之說也故曰道一生蓋水藏也由外由內兩年足乎七百二十斤之數然後者可得運轉其化如龍龍不得水何以神其變化耶進步入內化內行之三年足乎糧泉此時靜中受用靜中體認於極樂無比處見陰陽之根於極樂無比渾忘處入混沌之竅周身是理不戰而勝三尸六賊不殺自殺不滅自滅矣然採取時一千八十是液之精華烹煉時一錢八釐為丹之糟粕其分頭入五臟六腑九竅四肢遍歷毛孔千變萬化者液也即丹也而非丹之化而神神而生生而復化化而復神者也夫陰之氣至亥而極一陽乃生故曰活子人一身之氣之神由午歷亥陰濁不堪用子時乃清是時清神靜坐清也活也皆水也慮有道外之想棼吾靜念故曰息棼息棼之息即胎息之息息棼飲泉行三線之功嚮者但卷赤龍今則舌至線上略存一存存而後攪攪而復存此時之液即一千八十菁華所升其液較向時每一錢加重一分是以當伸頸仰面以力送下向用吞如日用飲食今用咽宜汩然有聲已清之神神之最靈動處為意存誠神化之意原非從心上起的是為死心以後去妄存真之意意即道水水活意活水清意清以此意送所攪之水由重樓規中從容送入臍下丹田隨於丹田中略存一存運訣自左至右五數覺有暖氣發動然後以訣將者拽橫分開為兩頭向後分入兩腎復合為一穿入命門略存一存然後以訣作五數引直而上歷轆轤夾脊玉枕上泥丸以訣作五數覺有冷氣旋轉意以為有水下至上以舌頂上齶迎入三線為一轉又照前行起初行九轉為率後至二九三九至九九其數以行功三日乃如一九初以意為有水下至上齶者非真有也訣也行之九九液中有菁華菁華中有神化入內化內之入丹田者一千八十灌滿丹田太極圈中不容空缺也九九之入丹田者一錢八釐猶嫌其多損之又損混淪圈中不著一毫也三年所積自一毫至十至百至千而今九九功成多者少之少者微之微者神之去其千百十而復歸於一毫此一毫為水中金他處容不得故仍歸氣海之母乃丹田中並此一毫容不得毛猶有倫是也又煉之至於微微而無無而神神而復生生而復化丹之中實無有丹而真丹成矣是之謂聖胎寶珠其珠上升泥丸有真水一點香美不可名言下於上齶為真玉醴真金漿即以此一點入三線又攪又煉此時有自然而然之功不復用意與訣而自然有聲達至丹田所至之路其路以水為路小則五湖大則四海而百川細流無不具其聲以空為聲五音八音大塊噫氣迦陵梵聲無不具行之九九以丹之中為無物而物外有物以丹之中為有物而不物於物無無有有生生化化神乎神乎言仙必加神故曰神仙人生甲子當去世成丹以後多留數十年謂龜身難得從此當愈加修煉也進步之說去凡步而仙步也進則不復退轉無上之門也前篇服活時之旨原該浹死晝在內復申言之六陽至巳而絶至午則梏亡而化為煙煙從火午者火盡熾既熾不名為火名為煙子之水不收拾而涸午之火不收拾而煙一也其法亦照活時清神靜坐攪三線水含於口中未即行咽而以意引起規中以上至於心盡之天之火其火之化而煙者原是死心以後未盡滅之根其火之可不化為煙而仍還於水者即是化內以來所最真之息此火引起上重樓而頓於中線以一火而與三線之水交水火濟陰陽生漸至少陰少陽復歸老陰老陽三水亦化為火而純陽成梏者浹之死者生之煙盡火明是煉火之法也火含口中與三線交約用訣五五之數然後以意送下汩然有聲照前以意送所煉之火由重樓規中從容送入丹田略存一存運訣自左至右五數覺有冷氣發動然後以訣將者橫分為兩頭向後分入兩腎復合為一穿入命門略存一存然後以訣作五數引直而上至泥丸以訣作五數覺有暖氣旋轉意以為有火下至上齶以舌頂上齶迎入三線水火相見為一轉至九九為率此法與服活時子午每日兼行俟其自然而然不見為水不見為火並不必行活時死晝之功斯入聖矣玄門下手時即攪華池抵上齶用子午功鼻吸清氣咽下有聲以意會及心送至臍下穿腎堂過夾脊陶道天柱風府玉枕透入泥丸與服活時氣亦用意相似而今用意何以在三年化境之後也蓋玄門家所以誤人在初下手即用意意者火也火動阻氣氣鬱生疾不開關猶可言也若開關則夾脊一路通道泥丸天一之水混沌已破從此閉精可得中法倘欲念一動其水已不能自安加之媾淫一泄其腦髓即從夾脊直流下至腎堂一泄無餘為患將不可言矣無生仙師道妙在三年化境以後始用此意是為死心來去妄存之意意即道水以訣行之訣不過引路初猶有訣水之既行並從前訣一毫不用存誠神化可以了生死矣故不死者死者也死者不死者也可以在家享用一切而為不損其真之至人可以出家抱藥飛升而成金身不壞之仙子入手直體正坐平手頂天抱胎疊手用力貴圓捏純陽訣垂簾勿愆旋左右背提撮谷便尾閭擺折叩齒漱玄行是數者六六皆然維虛與靜鼻息綿綿風火雷電云開氣旋橐籥已見卻病延年進步清神靜坐息棼飲泉服活時氣浹死晝煙見祖在腦云升惟淵多行善事漸寡世緣胎成果結魔閻避焉後天而老蛻形化仙數息凡數息乃初入之工夫人為物誘已久一旦離境不能自主未凝而復散故用心息相依法拴系此心由粗入妙自一息數至百千息方得此心離境漸漸純熟而息自調矣此法最捷徑最容易最無病與守丹田守泥丸守黃中者不同調息凡息有四種曰風曰喘曰氣曰息坐時鼻息有聲謂之風往來頻促謂之喘出入不細謂之氣綿綿密密謂之息風則散喘則戾氣則勞息則定所謂調者但欲其不風不促不喘不勞而已與數息不同調息無意數息有意綿綿密密若存若亡息調則神自歸根所以謂之胎息胎息夫調息久而神愈凝而息愈微又久則鼻中全無呼吸只有微息在臍上往來如嬰兒在母腹中一般所以謂之胎息息者心無思目無視耳無聞四體無動如種火相似真意燔結雌雄相聚微息綿綿與虛空同體自然與虛空同壽丘真人呼吸歌呼吸歌呼吸歌呼吸原來是橐籥呼吸上下閒來往呼吸升降有著落呼吸採藥知老嫩呼吸法度不要錯呼吸中間有一竅呼吸惟恐無聲樂呼吸以喉風順去呼吸以踵聖逆奪人人盡把呼吸過不認呼吸空打坐呼字坐在北斗下吸字住在南宮角呼字搬上崑崙頂吸字運入三清閣呼字洪濛開至竅吸字未生弄橐籥不是口鼻呼吸處實笑愚人大弄錯人死若得真呼吸復舊如初又在世有人識破呼吸處拜訪明師說仔細桑榆漫志陶輔鼻陽也飲天之六氣口陰也食地之五穀氣以滋元谷以養血氣附血而固如天之附地血依氣而榮如地之依天血氣和而精生精神堅而神爽一不能招存兩不能禁止能禁者久視能存者神乎推蓬寤語云間李豫亨丹書曰五行順行法界火坑五行顛倒大地成寶夫地至廣大何以能成寶也蓋五行相生俱自土中而形見於外故生金生水生木生火而坤土之氣遂泄如水不外流而藏體於金火不外揚而藏體於木金木交併復歸真土則氣不散逸為人物為草木禽魚而堅固不散盡成黃金氣不敗朽矣故曰遍地俱黃金也知此人能內固精神不外施用身中三寶亦如金之不敗朽矣其長生久視奚疑
